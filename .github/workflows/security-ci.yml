name: Security & Quality CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: PHP Lint
        run: find app -name "*.php" -exec php -l {} \;

      - name: Composer Audit
        run: composer audit

      - name: PHPStan Static Analysis
        run: ./vendor/bin/phpstan analyse --level=6 app --no-progress || true

      - name: Security Audit
        run: php artisan security:audit || true
        env:
          APP_ENV: testing
